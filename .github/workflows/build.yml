name: EAS Build (Staging)

on:
  workflow_dispatch: # manually triggered only — re-enable push trigger when EXPO_TOKEN is set

jobs:
  build:
    name: Staging Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas build --platform all --profile staging --non-interactive
